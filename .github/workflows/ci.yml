#Memberi nama workflow
name : Java CI

#Kapan dia berjalan (on)
on:
  #Begitu kita push ke github langsung build
  push:
    branches:
      - main

#Setelah membuat PR github juga akan mengetest projectnya
  pull_request:
    branches:
      - main


jobs:
  build:

    #Membuat github mwminjamkan komputer linux
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_ACCESS_EXPIRATION: ${{ secrets.JWT_ACCESS_EXPIRATION }}
      JWT_REFRESH_EXPIRATION: ${{ secrets.JWT_REFRESH_EXPIRATION }}

    steps:
      - name: Checkout Project
        #Github mengambil source code
        uses: actions/checkout@v5

      - name: Setup Java
        #Install java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Give execute permission
        #Memberi permission biasanya continue-on-error:  permission denied
        run: chmod +x mvnw

      - name: Run test
        #ini Github akan ngetest tapi working-directory:  envrionmentya
        run: ./mvnw clean test

      -  name: Package Application
         run: ./mvnw package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_TOKEN}}

      - name: Build Docker Image
        run: docker build -t agussupriyanto0/employee-api:latest .

      - name: Push Docker Image
        run: docker push agussupriyanto0/employee-api:latest